
#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

exec-once = hyprlock
exec-once = hyprpaper
exec-once = waybar
exec-once = swaync
exec-once = hyprctl dispatch workspace 2 && hyprctl dispatch exec -- alacritty -e tmux new -s default
