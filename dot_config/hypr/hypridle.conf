general {
    lock_cmd = pidof hyprlock || playerctl -a pause && hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd = hyprlock
}

listener {
    timeout = 120
    on-timeout = hyprlock
}

listener {
    timeout = 150
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on 
}

listener { 
    timeout = 900
    on-timeout = systemctl suspend
}

